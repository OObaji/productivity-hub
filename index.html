<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absence Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        slate: {
                            850: '#151e2e',
                            900: '#0f172a',
                            950: '#020617',
                        }
                    },
                    animation: {
                        'led-pulse': 'ledPulse 3s infinite',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
                        'fade-in': 'fadeIn 0.4s ease-out',
                    },
                    keyframes: {
                        ledPulse: {
                            '0%, 100%': { boxShadow: '0 0 5px rgba(56, 189, 248, 0.2), inset 0 0 0px rgba(56, 189, 248, 0)' },
                            '50%': { boxShadow: '0 0 20px rgba(56, 189, 248, 0.4), inset 0 0 10px rgba(56, 189, 248, 0.1)' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: 0 },
                            '100%': { transform: 'translateY(0)', opacity: 1 },
                        },
                        fadeIn: {
                            '0%': { opacity: 0 },
                            '100%': { opacity: 1 },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020617;
            background-image: 
                radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.15) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.15) 0, transparent 50%);
            color: #e2e8f0;
            overflow-y: hidden;
        }

        /* Animated Background Mesh */
        body::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            animation: moveMesh 60s linear infinite;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes moveMesh {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-30px, -30px); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
        ::-webkit-scrollbar-thumb { background: #1e40af; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }

        /* Modern Glass Panel */
        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(56, 189, 248, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .glass-panel:hover {
            border-color: rgba(56, 189, 248, 0.3);
        }

        /* Inputs */
        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: #f0f9ff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-field:focus {
            outline: none;
            border-color: #38bdf8;
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2), 0 0 20px rgba(56, 189, 248, 0.1);
            transform: translateY(-1px);
        }

        /* Buttons with Always-On LED Effect (Blue/Cyan) */
        .btn-action {
            background: linear-gradient(135deg, #2563eb 0%, #0891b2 100%);
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.25);
            animation: ledPulse 3s infinite ease-in-out;
        }
        .btn-action:hover {
            filter: brightness(1.2);
            transform: translateY(-2px) scale(1.01);
        }
        .btn-action:active { 
            transform: scale(0.96) translateY(0);
            animation: none;
            box-shadow: 0 0 5px rgba(56, 189, 248, 0.8); 
        }

        /* Module/Scenario Buttons */
        .scenario-btn {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-left: 4px solid rgba(148, 163, 184, 0.4);
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding-left: 1.25rem;
        }
        .scenario-btn:hover { 
            background: rgba(14, 165, 233, 0.1); 
            border-color: rgba(56, 189, 248, 0.5);
            transform: translateX(4px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .scenario-btn:active {
            transform: scale(0.98);
        }
        /* Selected State */
        .scenario-btn.selected {
            background: linear-gradient(90deg, rgba(14, 165, 233, 0.2), rgba(30, 41, 59, 0.6));
            border-color: #38bdf8;
            border-left: 5px solid #38bdf8; /* Blue Accent */
            color: #e0f2fe;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }
        .scenario-btn.selected::after {
            content: '';
            position: absolute;
            right: 15px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #38bdf8;
            box-shadow: 0 0 10px #38bdf8;
            animation: ledPulseFast 1.5s infinite;
        }

        /* Enhanced Copy Button (Refreshed) */
        .btn-copy {
            position: relative;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(56, 189, 248, 0.4);
            background: rgba(15, 23, 42, 0.8);
            color: #e0f2fe;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.15), inset 0 0 5px rgba(56, 189, 248, 0.1);
            animation: ledPulseSmall 3s infinite ease-in-out;
        }
        @keyframes ledPulseSmall {
            0%, 100% { box-shadow: 0 0 8px rgba(56, 189, 248, 0.2); border-color: rgba(56, 189, 248, 0.4); }
            50% { box-shadow: 0 0 16px rgba(56, 189, 248, 0.5); border-color: #7dd3fc; }
        }
        .btn-copy:hover {
            background: rgba(12, 74, 110, 0.8);
            color: #ffffff;
            transform: translateY(-2px);
            animation: none; 
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
            border-color: #38bdf8;
        }
        .btn-copy:active { transform: scale(0.96); }
        .btn-copy.btn-copied {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: #34d399;
            color: white;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.6);
            animation: none;
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Top Nav Items */
        .top-nav-item {
            position: relative;
            color: #94a3b8;
            transition: all 0.3s ease;
        }
        .top-nav-item:hover { color: #e0f2fe; text-shadow: 0 0 12px rgba(56, 189, 248, 0.6); transform: translateY(-1px); }
        .top-nav-item.active { color: #38bdf8; font-weight: 700; }
        .top-nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -24px;
            left: 0;
            right: 0;
            height: 4px;
            background: #38bdf8;
            box-shadow: 0 -2px 15px rgba(56, 189, 248, 0.8);
            border-radius: 4px 4px 0 0;
        }

        /* Toggle Tabs */
        .toggle-btn {
            transition: all 0.3s ease;
        }
        .toggle-btn.active {
            background: #0ea5e9;
            color: white;
            box-shadow: 0 0 25px rgba(14, 165, 233, 0.4);
            border: 1px solid #7dd3fc;
        }
        .toggle-btn:not(.active) {
            background: rgba(30, 41, 59, 0.5);
            color: #94a3b8;
            border: 1px solid transparent;
        }
        .toggle-btn:not(.active):hover {
            background: rgba(14, 165, 233, 0.15);
            color: #e0f2fe;
        }

        /* Custom Checkbox */
        .custom-checkbox {
            appearance: none;
            width: 1.5rem;
            height: 1.5rem;
            border: 2px solid rgba(148, 163, 184, 0.4);
            border-radius: 0.375rem;
            background-color: rgba(15, 23, 42, 0.5);
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }
        .custom-checkbox:checked {
            background-color: #0ea5e9;
            border-color: #0ea5e9;
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.4);
        }
        .custom-checkbox:checked::after {
            content: '';
            position: absolute;
            left: 30%;
            top: 15%;
            width: 30%;
            height: 50%;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        /* Animation Utilities */
        .animate-enter { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-base">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <!-- Top Navigation Bar -->
    <nav class="h-20 bg-slate-900/80 backdrop-blur-xl border-b border-slate-800 z-50 flex items-center justify-between px-8 lg:px-12 shrink-0 shadow-lg">
        <div class="flex items-center gap-4 group">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/20 group-hover:shadow-cyan-500/40 transition-shadow">
                <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            </div>
            <div>
                <h1 class="font-display text-2xl font-bold text-white tracking-tight">Absence Generator</h1>
            </div>
        </div>
        
        <div class="flex items-center gap-10 h-full">
            <button id="nav-call-log" class="top-nav-item text-base tracking-wide active">Call Log</button>
            <button id="nav-visit-request" class="top-nav-item text-base tracking-wide">Visit Request</button>
            <button id="nav-visit-queue" class="top-nav-item text-base tracking-wide flex items-center gap-2">
                Visit Queue
                <span id="queue-badge" class="hidden bg-cyan-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-[0_0_10px_rgba(34,211,238,0.5)]">0</span>
            </button>
        </div>

        <div class="w-10"></div> <!-- Spacer -->
    </nav>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-hidden relative">
        
        <!-- Page 2: Call Log Generator -->
        <div id="page-call-log" class="page absolute inset-0 overflow-y-auto p-6 md:p-8 lg:p-10 animate-enter">
            <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-5 gap-8 h-full">
                
                <!-- LEFT: Command Deck -->
                <div class="lg:col-span-3 flex flex-col gap-8 animate-enter delay-100">
                    <!-- Top Bar: Call Type -->
                    <div class="glass-panel p-2.5 rounded-3xl flex gap-3">
                        <button id="btn-type-inbound" class="toggle-btn flex-1 py-5 rounded-2xl flex items-center justify-center gap-3 font-display font-bold text-base tracking-wide transition-all">
                            <span class="w-2.5 h-2.5 rounded-full bg-emerald-400 shadow-[0_0_10px_rgba(52,211,153,0.6)]"></span>
                            INCOMING
                        </button>
                        <button id="btn-type-pd" class="toggle-btn flex-1 py-5 rounded-2xl flex items-center justify-center gap-3 font-display font-bold text-base tracking-wide active transition-all">
                            <span class="w-2.5 h-2.5 rounded-full bg-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.6)]"></span>
                            PD CALL
                        </button>
                    </div>

                    <!-- Main Controls -->
                    <div class="glass-panel p-8 rounded-3xl flex-1 flex flex-col min-h-0">
                        
                        <!-- Caller Identity Section -->
                        <div class="mb-8 border-b border-white/5 pb-6">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-3">
                                <span class="w-1.5 h-5 bg-indigo-500 rounded-full"></span>
                                Caller Identity
                            </label>
                            
                            <div class="flex gap-2 mb-4 bg-slate-900/50 p-1.5 rounded-xl border border-white/5">
                                <button id="caller-dw" class="flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 shadow-[0_0_15px_rgba(99,102,241,0.2)] transition-all">DW</button>
                                <button id="caller-rel" class="flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide text-slate-400 hover:text-slate-300 hover:bg-slate-800 transition-all border border-transparent">Others</button>
                                <button id="caller-pol" class="flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide text-slate-400 hover:text-slate-300 hover:bg-slate-800 transition-all border border-transparent">Police</button>
                            </div>

                            <!-- Dynamic Inputs (Hidden by default) -->
                            <div id="caller-inputs-rel" class="hidden animate-enter">
                                <input type="text" id="cl-rel-relation" class="input-field w-full rounded-xl p-3 font-mono text-sm" placeholder="Relationship or Person (e.g. Mother, Friend, Partner)">
                            </div>
                            
                            <div id="caller-inputs-pol" class="hidden animate-enter grid grid-cols-2 gap-3">
                                <input type="text" id="cl-pol-name" class="input-field w-full rounded-xl p-3 font-mono text-sm col-span-2" placeholder="Officer Name (e.g. PC Smith)">
                                <input type="text" id="cl-pol-badge" class="input-field w-full rounded-xl p-3 font-mono text-sm" placeholder="Badge Number">
                                <input type="text" id="cl-pol-station" class="input-field w-full rounded-xl p-3 font-mono text-sm" placeholder="Police Station">
                                <div class="col-span-2 flex items-center justify-between p-3.5 rounded-xl bg-slate-800/40 border border-white/5 mt-1 cursor-pointer hover:bg-slate-800 transition-colors" onclick="document.getElementById('cl-pol-pass').click()">
                                    <span class="text-xs font-bold text-slate-300 uppercase select-none">Password Confirmed on phone?</span>
                                    <input type="checkbox" id="cl-pol-pass" class="custom-checkbox w-5 h-5 pointer-events-none">
                                </div>
                            </div>
                        </div>

                        <div id="scenario-container" class="animate-enter">
                            <div class="flex justify-between items-end mb-6">
                                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-3">
                                    <span class="w-1.5 h-5 bg-cyan-500 rounded-full"></span>
                                    Select Scenario
                                </label>
                                <span class="text-xs text-slate-500 font-mono flex items-center gap-2">
                                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                    Live Update Active
                                </span>
                            </div>
                            
                            <!-- Scenario Grid -->
                            <div id="scenario-buttons" class="grid grid-cols-2 gap-4 overflow-y-auto custom-scrollbar pr-2 pb-6">
                                <!-- Injected via JS -->
                            </div>

                            <!-- Violation Sub-option (Hidden by default) -->
                            <div id="violation-container" class="hidden pt-2 pb-4 border-t border-white/5 animate-enter">
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-3">
                                    <span class="w-1.5 h-5 bg-purple-500 rounded-full"></span>
                                    Is this a violation?
                                </label>
                                <div class="flex gap-2 bg-slate-900/50 p-1.5 rounded-xl border border-white/5">
                                    <button id="btn-viol-denied" class="flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide bg-purple-500/20 text-purple-400 border border-purple-500/30 shadow-[0_0_15px_rgba(168,85,247,0.2)] transition-all">No (Denied)</button>
                                    <button id="btn-viol-admitted" class="flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide text-slate-400 hover:text-slate-300 hover:bg-slate-800 transition-all border border-transparent">Yes (Violation)</button>
                                </div>
                            </div>

                            <!-- Hospital Sub-option (Hidden by default) -->
                            <div id="hospital-container" class="hidden pt-2 pb-4 border-t border-white/5 animate-enter">
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-3">
                                    <span class="w-1.5 h-5 bg-rose-500 rounded-full"></span>
                                    Hospital Details
                                </label>
                                <input type="text" id="cl-hosp-name" class="input-field w-full rounded-xl p-3 font-mono text-sm" placeholder="Name of Hospital (Optional)">
                            </div>

                            <!-- Visit Enquiry Sub-option (Hidden by default) -->
                            <div id="visit-enq-container" class="hidden pt-2 pb-4 border-t border-white/5 animate-enter">
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-3">
                                    <span class="w-1.5 h-5 bg-amber-500 rounded-full"></span>
                                    Enquiry Type
                                </label>
                                <div class="flex gap-2 mb-4 bg-slate-900/50 p-1.5 rounded-xl border border-white/5">
                                    <button id="btn-ve-pending" class="flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide bg-amber-500/20 text-amber-400 border border-amber-500/30 shadow-[0_0_15px_rgba(245,158,11,0.2)] transition-all">Pending</button>
                                    <button id="btn-ve-missed" class="flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide text-slate-400 hover:text-slate-300 hover:bg-slate-800 transition-all border border-transparent">Missed</button>
                                    <button id="btn-ve-new" class="flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide text-slate-400 hover:text-slate-300 hover:bg-slate-800 transition-all border border-transparent">Request New</button>
                                </div>
                                
                                <div id="ve-new-inputs" class="hidden animate-enter grid grid-cols-2 gap-3 mt-3">
                                    <input type="text" id="ve-new-name" class="input-field w-full rounded-xl p-3 font-mono text-sm" placeholder="DW Name">
                                    <input type="text" id="ve-new-id" class="input-field w-full rounded-xl p-3 font-mono text-sm" placeholder="Order ID">
                                    <input type="text" id="ve-new-reason" class="input-field w-full rounded-xl p-3 font-mono text-sm col-span-2" placeholder="Reason for Visit">
                                    <button id="ve-add-btn" class="col-span-2 btn-action h-11 rounded-xl text-xs font-bold uppercase tracking-wide text-white mt-1 shadow-lg flex items-center justify-center gap-2">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                                        Add to Visit Queue
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Details Input -->
                        <div class="mt-4 pt-6 border-t border-white/5">
                            <div class="flex items-center justify-between mb-4">
                                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-3">
                                    <span class="w-1.5 h-5 bg-sky-500 rounded-full"></span>
                                    Additional Context
                                </label>
                                <button id="btn-reset-call" class="bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 hover:text-rose-300 border border-rose-500/30 rounded-xl px-4 py-2 flex items-center gap-2 transition-all group" title="Clear form for new call">
                                    <svg class="w-4 h-4 group-hover:-rotate-180 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                    <span class="text-[10px] font-bold uppercase tracking-widest">Reset Form</span>
                                </button>
                            </div>
                            <textarea id="call-log-custom-details" class="input-field w-full h-28 rounded-2xl p-5 font-mono text-sm leading-relaxed" placeholder="Type details here to update log instantly..."></textarea>
                        </div>

                        <!-- Visit Required Section -->
                        <div class="mt-4 pt-6 border-t border-white/5">
                            <div class="flex items-center justify-between mb-4">
                                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-3">
                                    <span class="w-1.5 h-5 bg-rose-500 rounded-full"></span>
                                    Visit Required?
                                </label>
                                <div class="flex items-center gap-3 px-3 py-1.5 rounded-full bg-slate-800/50 border border-white/5 cursor-pointer hover:bg-slate-800 transition-colors" onclick="document.getElementById('cl-visit-required').click()">
                                    <span class="text-[11px] font-bold text-slate-300 uppercase select-none">Yes, Request Visit</span>
                                    <input type="checkbox" id="cl-visit-required" class="custom-checkbox w-4 h-4 pointer-events-none">
                                </div>
                            </div>
                            
                            <div id="cl-visit-inputs" class="hidden animate-enter grid grid-cols-2 gap-3">
                                <input type="text" id="cl-visit-name" class="input-field w-full rounded-xl p-3 font-mono text-sm" placeholder="Subject Name">
                                <input type="text" id="cl-visit-id" class="input-field w-full rounded-xl p-3 font-mono text-sm" placeholder="Order ID (Optional)">
                                <input type="text" id="cl-visit-reason" class="input-field w-full rounded-xl p-3 font-mono text-sm col-span-2" placeholder="Reason for Visit">
                                <button id="cl-visit-btn" class="col-span-2 btn-action h-11 rounded-xl text-xs font-bold uppercase tracking-wide text-white mt-1 shadow-lg">Add to Visit Queue</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- RIGHT: Data Stream -->
                <div class="lg:col-span-2 flex flex-col h-full gap-8 animate-enter delay-200">

                            <button id="vr-copy-log-btn" class="btn-copy h-9 px-4 rounded-xl text-xs font-bold uppercase tracking-wide gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 01-2-2V5"></path></svg>

                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>

                <!-- Table Section -->
                <div class="glass-panel rounded-3xl flex-1 flex flex-col min-h-[400px] animate-enter delay-200 overflow-hidden border-t-2 border-slate-700/50">
                    <!-- Table Header -->
                    <div class="grid grid-cols-[80px_1fr_1fr_1.5fr_80px] gap-4 px-6 py-4 border-b border-white/10 bg-slate-900/50">
                        <div class="text-xs font-bold text-slate-400 uppercase tracking-widest text-center">Status</div>
                        <div class="text-xs font-bold text-slate-400 uppercase tracking-widest">Subject Name</div>
                        <div class="text-xs font-bold text-slate-400 uppercase tracking-widest">Order ID</div>
                        <div class="text-xs font-bold text-slate-400 uppercase tracking-widest">Reason</div>

                    </div>

            </div>
        </div>

    </main>

    <script type="module">
        document.addEventListener('DOMContentLoaded', async () => {
            // --- Custom Toast Notification ---
            function showToast(message, type = 'error') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                const bgColor = type === 'error' ? 'bg-rose-500/90 border-rose-500/50' : (type === 'warning' ? 'bg-amber-500/90 border-amber-500/50' : 'bg-emerald-500/90 border-emerald-500/50');
                
                toast.className = `px-6 py-4 rounded-xl text-white font-bold text-sm shadow-[0_10px_40px_rgba(0,0,0,0.5)] border backdrop-blur-md transform transition-all duration-300 translate-y-10 opacity-0 ${bgColor} flex items-center gap-3`;
                
                let icon = '';
                if(type === 'error') icon = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
                else if(type === 'warning') icon = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>';
                else icon = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
                
                toast.innerHTML = `${icon}<span>${message}</span>`;
                container.appendChild(toast);

                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        toast.classList.remove('translate-y-10', 'opacity-0');
                    });
                });

                setTimeout(() => {
                    toast.classList.add('translate-y-10', 'opacity-0');
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }

            // --- Navigation Logic ---
            const pages = {
                'nav-call-log': document.getElementById('page-call-log'),
                'nav-visit-request': document.getElementById('page-visit-request'),
                'nav-visit-queue': document.getElementById('page-visit-queue')
            };

            Object.keys(pages).forEach(navId => {
                const btn = document.getElementById(navId);
                if(btn) {
                    btn.addEventListener('click', () => {
                        Object.keys(pages).forEach(id => {
                            if(document.getElementById(id)) document.getElementById(id).classList.remove('active');
                            if(pages[id]) pages[id].classList.add('hidden');
                        });
                        document.querySelectorAll('.top-nav-item').forEach(el => el.classList.remove('active'));
                        btn.classList.add('active');
                        if(pages[navId]) pages[navId].classList.remove('hidden');
                    });
                }
            });

            if (document.getElementById('nav-call-log')) {
                document.getElementById('nav-call-log').classList.add('active');
            }

            // --- Utility: Copy to Clipboard ---
            function copyToClipboard(text, btnElement) {
                if(!text) return;
                const textArea = document.createElement('textarea');
                textArea.value = text;
                textArea.style.position = 'fixed'; 
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                
                try {
                    document.execCommand('copy');
                    if (btnElement) {
                        if (!btnElement.dataset.originalContent) {
                            btnElement.dataset.originalContent = btnElement.innerHTML;
                        }
                        if (btnElement.copyTimeout) clearTimeout(btnElement.copyTimeout);
                        btnElement.innerHTML = `<span class="flex items-center gap-2 animate-[popIn_0.2s_ease-out]"><svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg><span class="text-emerald-400">COPIED</span></span>`;
                        btnElement.classList.add('btn-copied');
                        btnElement.copyTimeout = setTimeout(() => {
                            btnElement.innerHTML = btnElement.dataset.originalContent;
                            btnElement.classList.remove('btn-copied');
                            delete btnElement.dataset.originalContent; 
                            delete btnElement.copyTimeout;
                        }, 1000);
                    }
                } catch (err) {
                    showToast('Failed to copy to clipboard.', 'error');
                }
                document.body.removeChild(textArea);
            }

            // --- STREAMING_CHUNK:Initializing Call Log Logic... ---
            // --- Call Log Generator ---
            const scenarios = {
                "Incoming Call": [
                    "Out past curfew",          
                    "Left home during the curfew",  
                    "DW called", 
                    "Battery status check", 
                    "Charger faults", 
                    "Hospital", 
                    "Visit enquiries", 
                    "No response",
                    "Call back requests",
                    "Order enquiries",
                    "Emergency services required",
                    "Other incidents"
                ],
                "PD Call": [
                    "Out past curfew",             
                    "Left home during the curfew", 
                    "Denied lateness",  
                    "Denied absence during curfew",
                    "Equipment tamper",
                    "Equipment power off",
                    "Equipment low battery",
                    "Other incident"
                ]
            };
            
            const clContainer = document.getElementById('scenario-buttons');
            let clState = { 
                type: 'PD Call', 
                event: null,
                caller: 'DW',
                violationStatus: 'denied',
                visitEnquiryType: 'pending'
            };
            
            // UI Updates for Caller Types
            const btnDw = document.getElementById('caller-dw');
            const btnRel = document.getElementById('caller-rel');
            const btnPol = document.getElementById('caller-pol');
            const inputsRel = document.getElementById('caller-inputs-rel');
            const inputsPol = document.getElementById('caller-inputs-pol');

            function updateCallerUI() {
                const scenarioContainer = document.getElementById('scenario-container');
                const customInput = document.getElementById('call-log-custom-details');
                
                [btnDw, btnRel, btnPol].forEach(b => {
                    b.className = 'flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide text-slate-400 hover:text-slate-300 hover:bg-slate-800 transition-all border border-transparent';
                });
                
                // Hide Police button for PD Calls
                if (clState.type === 'PD Call') {
                    if (btnPol) btnPol.classList.add('hidden');
                } else {
                    if (btnPol) btnPol.classList.remove('hidden');
                }

                inputsRel.classList.add('hidden');
                inputsPol.classList.add('hidden');

                if (clState.caller === 'DW') {
                    btnDw.className = 'flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 shadow-[0_0_15px_rgba(99,102,241,0.2)] transition-all';
                    if(scenarioContainer) scenarioContainer.classList.remove('hidden');
                    if(customInput) customInput.placeholder = "Type details here to update log instantly...";
                } else if (clState.caller === 'Others') {
                    btnRel.className = 'flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 shadow-[0_0_15px_rgba(99,102,241,0.2)] transition-all';
                    inputsRel.classList.remove('hidden');
                    if(scenarioContainer) scenarioContainer.classList.add('hidden');
                    if(customInput) customInput.placeholder = "Type what the other person stated here...";
                } else if (clState.caller === 'Police') {
                    btnPol.className = 'flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 shadow-[0_0_15px_rgba(99,102,241,0.2)] transition-all';
                    inputsPol.classList.remove('hidden');
                    if(scenarioContainer) scenarioContainer.classList.add('hidden');
                    if(customInput) customInput.placeholder = "Type the information the police provided here...";
                }
                updateLogOutput();
            }

            if(btnDw) btnDw.addEventListener('click', () => { clState.caller = 'DW'; updateCallerUI(); });
            if(btnRel) btnRel.addEventListener('click', () => { clState.caller = 'Others'; updateCallerUI(); });
            if(btnPol) btnPol.addEventListener('click', () => { clState.caller = 'Police'; updateCallerUI(); });

            // --- Violation Status Logic ---
            const btnViolDenied = document.getElementById('btn-viol-denied');
            const btnViolAdmitted = document.getElementById('btn-viol-admitted');
            const violationContainer = document.getElementById('violation-container');

            function updateViolationUI() {
                if (!btnViolDenied || !btnViolAdmitted) return;
                if (clState.violationStatus === 'denied') {
                    btnViolDenied.className = 'flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide bg-purple-500/20 text-purple-400 border border-purple-500/30 shadow-[0_0_15px_rgba(168,85,247,0.2)] transition-all';
                    btnViolAdmitted.className = 'flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide text-slate-400 hover:text-slate-300 hover:bg-slate-800 transition-all border border-transparent';
                } else {
                    btnViolAdmitted.className = 'flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide bg-rose-500/20 text-rose-400 border border-rose-500/30 shadow-[0_0_15px_rgba(244,63,94,0.2)] transition-all';
                    btnViolDenied.className = 'flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide text-slate-400 hover:text-slate-300 hover:bg-slate-800 transition-all border border-transparent';
                }
                updateLogOutput();
            }

            if(btnViolDenied) btnViolDenied.addEventListener('click', () => { clState.violationStatus = 'denied'; updateViolationUI(); });
            if(btnViolAdmitted) btnViolAdmitted.addEventListener('click', () => { clState.violationStatus = 'admitted'; updateViolationUI(); });

            // --- Visit Enquiry UI Logic ---
            const btnVePending = document.getElementById('btn-ve-pending');
            const btnVeMissed = document.getElementById('btn-ve-missed');
            const btnVeNew = document.getElementById('btn-ve-new');
            const veNewInputs = document.getElementById('ve-new-inputs');

            function updateVisitEnquiryUI() {
                if(!btnVePending) return;
                [btnVePending, btnVeMissed, btnVeNew].forEach(b => {
                    b.className = 'flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide text-slate-400 hover:text-slate-300 hover:bg-slate-800 transition-all border border-transparent';
                });
                
                if (veNewInputs) veNewInputs.classList.add('hidden');

                if (clState.visitEnquiryType === 'pending') {
                    btnVePending.className = 'flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide bg-amber-500/20 text-amber-400 border border-amber-500/30 shadow-[0_0_15px_rgba(245,158,11,0.2)] transition-all';
                } else if (clState.visitEnquiryType === 'missed') {
                    btnVeMissed.className = 'flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide bg-amber-500/20 text-amber-400 border border-amber-500/30 shadow-[0_0_15px_rgba(245,158,11,0.2)] transition-all';
                } else if (clState.visitEnquiryType === 'new') {
                    btnVeNew.className = 'flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wide bg-amber-500/20 text-amber-400 border border-amber-500/30 shadow-[0_0_15px_rgba(245,158,11,0.2)] transition-all';
                    if (veNewInputs) veNewInputs.classList.remove('hidden');
                }
                updateLogOutput();
            }

            if(btnVePending) btnVePending.addEventListener('click', () => { clState.visitEnquiryType = 'pending'; updateVisitEnquiryUI(); });
            if(btnVeMissed) btnVeMissed.addEventListener('click', () => { clState.visitEnquiryType = 'missed'; updateVisitEnquiryUI(); });
            if(btnVeNew) btnVeNew.addEventListener('click', () => { clState.visitEnquiryType = 'new'; updateVisitEnquiryUI(); });

            const veAddBtn = document.getElementById('ve-add-btn');
            if(veAddBtn) {
                veAddBtn.addEventListener('click', () => {
                    const name = document.getElementById('ve-new-name').value.trim();
                    const orderId = document.getElementById('ve-new-id').value.trim();
                    const reason = document.getElementById('ve-new-reason').value.trim();
                    
                    if (name && reason) {
                        if (typeof visitQueue !== 'undefined' && typeof saveQueueLocally === 'function' && typeof renderQueue === 'function') {
                            visitQueue.push({ id: Date.now().toString(), name: name, orderId: orderId, reason: reason, done: false });
                            saveQueueLocally(); 
                            renderQueue();
                            showToast("Added to Visit Queue", "success");
                            document.getElementById('ve-new-name').value = '';
                            document.getElementById('ve-new-id').value = '';
                        }
                    } else {
                        showToast("Please enter a Name and Reason", "error");
                    }
                });
            }

            function updateScenarioExtrasVisibility() {
                if (!violationContainer) return;
                
                // Violation
                if ((clState.event === 'Equipment tamper' || clState.event === 'Equipment power off') && clState.type === 'PD Call') {
                    violationContainer.classList.remove('hidden');
                } else {
                    violationContainer.classList.add('hidden');
                }

                // Hospital
                const hospContainer = document.getElementById('hospital-container');
                if (hospContainer) {
                    if (clState.event === 'Hospital' && clState.type === 'Incoming Call') {
                        hospContainer.classList.remove('hidden');
                    } else {
                        hospContainer.classList.add('hidden');
                    }
                }

                // Visit Enquiries
                const veContainer = document.getElementById('visit-enq-container');
                if (veContainer) {
                    if (clState.event === 'Visit enquiries' && clState.type === 'Incoming Call') {
                        veContainer.classList.remove('hidden');
                    } else {
                        veContainer.classList.add('hidden');
                    }
                }
            }

            // Listen to all inputs to instantly live-update the text area

            // --- STREAMING_CHUNK:Local Storage & Visit Queue Integration... ---
            let visitQueue = [];
            const LOCAL_STORAGE_KEY = 'absence_generator_visit_queue';

            const vqOrderIdInput = document.getElementById('vq-order-id');

            // Save the current array into local storage
            function saveQueueLocally() {
                try {
                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(visitQueue));
                } catch (e) {
                    console.error("Local storage save failed", e);
                }
            }

            // Load the array from local storage on startup
            function loadQueueLocally() {
                try {
                    const savedData = localStorage.getItem(LOCAL_STORAGE_KEY);
                    if (savedData) {
                        visitQueue = JSON.parse(savedData);
                    }
                } catch (e) {
                    console.error("Local storage load failed", e);
                    visitQueue = [];

                renderQueue();
            }

            function renderQueue() {
                if(!vqList) return;
                vqList.innerHTML = '';
                let pending = 0;

                if (visitQueue.length === 0) {
                    vqList.innerHTML = `
                        <div class="h-full flex flex-col items-center justify-center text-slate-500 mt-12">
                            <div class="w-12 h-12 rounded-full bg-slate-800/50 flex items-center justify-center mb-3 border border-white/5">
                                <svg class="w-6 h-6 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                            </div>
                            <p class="text-[11px] font-mono uppercase tracking-widest">Queue is empty</p>
                        </div>
                    `;
                } else {
                    visitQueue.forEach((item) => {
                        if (!item.done) pending++;
                        
                        const row = document.createElement('div');
                        row.className = `grid grid-cols-[80px_1fr_1fr_1.5fr_80px] gap-4 items-center px-4 py-3 rounded-xl transition-all border-b border-white/5 last:border-0 hover:bg-slate-800/40 group ${item.done ? 'opacity-50 grayscale' : ''}`;
                        
                        // Status Checkbox
                        const col1 = document.createElement('div');
                        col1.className = 'flex justify-center items-center h-full';
                        const cb = document.createElement('input');
                        cb.type = 'checkbox';
                        cb.checked = item.done;
                        cb.className = 'custom-checkbox';
                        cb.addEventListener('change', () => {
                            item.done = cb.checked;
                            saveQueueLocally();
                            renderQueue();
                        });
                        col1.appendChild(cb);
                        
                        // Subject Name
                        const col2 = document.createElement('div');
                        const nameEl = document.createElement('span');
                        nameEl.className = `font-bold text-[13px] font-mono cursor-pointer hover:text-cyan-400 transition-colors ${item.done ? 'line-through text-slate-500' : 'text-white'}`;
                        nameEl.textContent = item.name;
                        nameEl.title = "Click to copy name";
                        nameEl.addEventListener('click', () => {
                            copyToClipboard(item.name, null);
                            showToast(`Copied ${item.name} to clipboard!`, 'success');
                        });
                        col2.appendChild(nameEl);

                        // Order ID
                        const col3 = document.createElement('div');
                        const orderEl = document.createElement('span');
                        orderEl.className = `font-bold text-[13px] font-mono cursor-pointer hover:text-cyan-400 transition-colors ${item.done ? 'line-through text-slate-500' : 'text-slate-300'}`;
                        orderEl.textContent = item.orderId || '-';
                        if (item.orderId) {
                            orderEl.title = "Click to copy Order ID";
                            orderEl.addEventListener('click', () => {
                                copyToClipboard(item.orderId, null);
                                showToast(`Copied ${item.orderId} to clipboard!`, 'success');
                            });
                        }
                        col3.appendChild(orderEl);
                        
                        // Reason
                        const col4 = document.createElement('div');
                        const reasonEl = document.createElement('span');
                        reasonEl.className = 'text-[13px] font-mono text-slate-300';
                        reasonEl.textContent = item.reason;
                        col4.appendChild(reasonEl);
                        
                        // Actions (Delete)
                        const col5 = document.createElement('div');
                        col5.className = 'flex justify-center items-center h-full';
                        const delBtn = document.createElement('button');
                        delBtn.className = 'text-slate-500 hover:text-rose-400 p-2 rounded-lg transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100';
                        delBtn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>';
                        delBtn.addEventListener('click', () => {
                            visitQueue = visitQueue.filter(i => i.id !== item.id);
                            saveQueueLocally();
                            renderQueue();
                            showToast("Item removed", "success");
                        });
                        col5.appendChild(delBtn);
                        
                        row.appendChild(col1);
                        row.appendChild(col2);
                        row.appendChild(col3);
                        row.appendChild(col4);
                        row.appendChild(col5);
                        vqList.appendChild(row);
                    });
                }

                if(queueBadge) {
                    if (pending > 0) {
                        queueBadge.textContent = pending;
                        queueBadge.classList.remove('hidden');
                    } else {
                        queueBadge.classList.add('hidden');
                    }
                }
            }

            function addQueueItem() {
                const name = vqNameInput.value.trim();
                const orderId = vqOrderIdInput.value.trim();
                const reason = vqReasonInput.value.trim();
                
                if (name && reason) {
                    const newItem = {
                        id: Date.now().toString(), 
                        name: name, 
                        orderId: orderId,
                        reason: reason, 
                        done: false 
                    };
                    
                    visitQueue.push(newItem);
                    saveQueueLocally(); // Instantly save to local storage
                    renderQueue();
                    
                    showToast("Added to Visit Queue", "success");

                    vqNameInput.value = '';
                    vqOrderIdInput.value = '';
                    vqReasonInput.value = '';
                    vqNameInput.focus();
                } else {
                    showToast("Please enter a Name and Reason", "error");
                }
            }

            // Event Listeners for Adding
            if(vqAddBtn) vqAddBtn.addEventListener('click', addQueueItem);
            
            const handleEnter = (e) => { 
                if (e.key === 'Enter') addQueueItem(); 
            };
            if(vqNameInput) vqNameInput.addEventListener('keypress', handleEnter);
            if(vqOrderIdInput) vqOrderIdInput.addEventListener('keypress', handleEnter);
            if(vqReasonInput) vqReasonInput.addEventListener('keypress', handleEnter);

            // Clear Queue Button
            if(vqClearBtn) {
                vqClearBtn.addEventListener('click', () => {
                    if(visitQueue.length === 0) {
                        showToast("Queue is already empty", "warning");
                        return;
                    }
                    
                    visitQueue = [];
                    saveQueueLocally(); // Save empty array to clear local storage
                    renderQueue();
                    showToast("Visit Queue Cleared", "success");
                });
            }

            // Initial load from local storage
            loadQueueLocally();
        });
    </script>
</body>
</html>
